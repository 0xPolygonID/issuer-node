apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-api

spec:
  parentRefs:
    - name: main
      namespace: infra
  hostnames:
    - "issuer-node-core-api-demo.privado.id"
    - "issuer-node-core-api-demo-k8s.internal-iden3-dev.com"
  rules:
    - backendRefs:
        - name: issuer-node-main-api-svc
          port: 3001
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-ui

spec:
  parentRefs:
    - name: main
      namespace: infra
  hostnames:
    - "issuer-node.privado.id"
    - "issuer-node-demo-k8s.internal-iden3-dev.com"
  rules:
    - backendRefs:
        - name: issuer-node-main-ui-svc
          port: 8080
