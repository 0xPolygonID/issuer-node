apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: issuer-node-api

spec:
  parentRefs:
    - name: main
      namespace: infra
  hostnames:
    - "issuer-node-core-api-demo.privado.id"
  rules:
    - backendRefs:
        - name: issuer-node-main-api-svc
          port: 3001
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: issuer-node-ui

spec:
  parentRefs:
    - name: main
      namespace: infra
  hostnames:
    - "issuer-node-ui-demo.privado.id"
  rules:
    - backendRefs:
        - name: issuer-node-main-ui-svc
          port: 8080
